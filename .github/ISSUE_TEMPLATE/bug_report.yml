name: 🐛 Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for the report! Please search existing issues first.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '…'
        2. Click '…'
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Browserr version
      description: Shown at the bottom of the Settings page (e.g. v0.1.0 or an image tag).
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: How are you running it?
      options:
        - Docker / docker-compose
        - Local (npm run dev / build)
        - Other
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics export
      description: |
        The fastest way to give us context. In the app go to **Settings →
        Diagnostics → Export diagnostics** (bottom of the Settings screen) and
        attach the downloaded `browserr-diagnostics-*.json` here (drag it in), or
        paste its contents. It includes your runtime (node/docker/k8s), non-secret
        settings, and recent logs. **Secrets, API keys, and the internal Seerr URL
        are already redacted** - but please skim it before posting.
      render: json
  - type: textarea
    id: logs
    attributes:
      label: Additional logs (optional)
      description: Any extra server logs or the browser console. Redact any secrets.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I redacted API keys, tokens, and internal URLs from this report.
          required: true
