# Browserr alongside Seerr. The key detail is the internal/external URL split:
#   SEERR_INTERNAL_URL → http://seerr:5055   (this Docker network; server-to-server)
#   SEERR_EXTERNAL_URL → your public Seerr URL (browser redirects only)
#
# Copy .env.example to .env and fill in TMDB + Seerr details first.

services:
  browserr:
    build: .
    # Or use the published image instead of building:
    # image: ghcr.io/janpuc/browserr:latest
    container_name: browserr
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # These override .env to wire Browserr to the Seerr container by name.
      - DATABASE_URL=sqlite:///data/browserr.db
      - SEERR_INTERNAL_URL=http://seerr:5055
      # SEERR_EXTERNAL_URL must be your browser-reachable Seerr address — set in .env.
    volumes:
      - browserr-data:/data
    depends_on:
      - seerr
    networks:
      - media

  # The unified Overseerr/Jellyseerr successor. Swap the image for
  # fallenbagel/jellyseerr or sctx/overseerr if you prefer.
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    restart: unless-stopped
    ports:
      - "5055:5055"
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - seerr-config:/app/config
    networks:
      - media

volumes:
  browserr-data:
  seerr-config:

networks:
  media:
    driver: bridge
